name: 辰曦音乐 - 打包

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Build unpacked
        run: npx electron-builder --win --dir

      - name: Copy portable.flag
        run: copy build\portable.flag dist\win-unpacked\resources\portable.flag

      - name: Pack zip
        run: Compress-Archive -Path dist\win-unpacked\* -DestinationPath dist\chenxi-music-portable.zip

      - name: Release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload $tag dist\chenxi-music-portable.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: chenxi-music-portable
          path: dist/chenxi-music-portable.zip
          retention-days: 90
          if-no-files-found: ignore
