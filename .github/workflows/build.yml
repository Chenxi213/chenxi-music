name: 辰曦音乐 - 打包

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Build unpacked directory
        run: npx electron-builder --win --dir

      - name: Create portable marker
        run: |
          New-Item -Path "dist\win-unpacked\portable.flag" -ItemType File -Force

      - uses: actions/upload-artifact@v4
        with:
          name: 辰曦音乐-绿色免安装版
          path: dist/win-unpacked/
          retention-days: 90
          if-no-files-found: ignore
