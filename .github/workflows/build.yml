name: 辰曦音乐 - Windows 打包

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          echo "=== Node $(node -v) / NPM $(npm -v) ==="
          npm install 2>&1
          echo "=== Install done ==="

      - name: Build Electron app
        run: |
          echo "=== electron-builder version ==="
          npx electron-builder --version
          echo "=== Building... ==="
          npx electron-builder --win --publish always 2>&1
          echo "=== Build exit code: $? ==="
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        if: always()
        run: |
          echo "=== dist contents ==="
          dir dist /s /b 2>&1 || echo "no dist dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chenxi-music-setup
          path: |
            dist/*.exe
            dist/*.blockmap
          retention-days: 30
          if-no-files-found: ignore
