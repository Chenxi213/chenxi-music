<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辰曦音乐</title>
<link rel="stylesheet" href="assets/main.css">
</head>
<body>

<!-- 顶部菜单栏（模仿辰星音乐风格） -->
<header class="top-menu" role="menubar" aria-label="主菜单">
  <button class="tm-item" data-panel="play" accesskey="E" role="menuitem">
    <span>文件</span><span class="tm-key">(E)</span>
  </button>
  <button class="tm-item" data-panel="play" accesskey="P" role="menuitem">
    <span>播放</span><span class="tm-key">(P)</span>
  </button>
  <button class="tm-item" data-panel="charts" accesskey="R" role="menuitem">
    <span>排行榜</span><span class="tm-key">(R)</span>
  </button>
  <button class="tm-item" data-panel="playlist" accesskey="G" role="menuitem">
    <span>歌单</span><span class="tm-key">(G)</span>
  </button>
  <button class="tm-item" data-panel="settings" accesskey="C" role="menuitem">
    <span>设置</span><span class="tm-key">(C)</span>
  </button>
  <button class="tm-item" data-panel="help" accesskey="H" role="menuitem">
    <span>帮助</span><span class="tm-key">(H)</span>
  </button>
</header>

<main class="main-wrap" role="main" aria-label="辰曦音乐主界面">

  <!-- 搜索区域（下拉框风格） -->
  <section class="search-section" aria-label="搜索区域">
    <div class="search-toolbar">
      <div class="search-icon" aria-hidden="true">♪</div>
      <label class="search-label" for="searchInput">搜索:</label>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="输入歌名、歌手或专辑…"
        aria-label="搜索框，输入关键词后回车搜索"
        autocomplete="off"
        spellcheck="false"
        accesskey="F"
      >
      <label class="search-label" for="scopeSelect">范围:</label>
      <select id="scopeSelect" class="search-select" aria-label="搜索范围">
        <option value="song">歌曲</option>
        <option value="playlist">歌单</option>
        <option value="album">专辑</option>
        <option value="singer">歌手</option>
      </select>
      <label class="search-label" for="siteSelect">站点:</label>
      <select id="siteSelect" class="search-select" aria-label="搜索站点">
        <option value="all">全部站点</option>
        <option value="wy">网易云音乐</option>
        <option value="tx">QQ音乐</option>
        <option value="kg">酷狗</option>
        <option value="kw">酷我</option>
        <option value="mg">咪咕</option>
        <option value="qsvip">汽水VIP</option>
      </select>
      <button id="searchBtn" class="search-btn" aria-label="搜索按钮">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>搜索</span>
      </button>
      <span id="searchMeta" class="search-meta" aria-live="polite">搜索结果，共 0 首</span>
    </div>

    <!-- 类型筛选（简化版） -->
    <div class="filter-row" style="margin-top:8px">
      <span class="filter-label">筛选</span>
      <div class="chips" role="group" aria-label="音质筛选" id="qualityChips">
        <button class="chip on" data-q="all" role="checkbox" aria-checked="true">全部</button>
        <button class="chip" data-q="hr" role="checkbox" aria-checked="false">Hi-Res</button>
        <button class="chip" data-q="loss" role="checkbox" aria-checked="false">无损</button>
        <button class="chip" data-q="live" role="checkbox" aria-checked="false">Live</button>
      </div>
    </div>
  </section>

  <!-- 搜索结果列表 -->
  <section class="results-section" aria-label="搜索结果">
    <div class="results-header">
      <span class="rh-num">#</span>
      <span class="rh-name">歌曲</span>
      <span class="rh-artist">歌手</span>
      <span class="rh-plat">平台</span>
      <span class="rh-quality">音质</span>
      <span class="rh-duration">时长</span>
      <span class="rh-actions"></span>
    </div>
    <ul id="resultsList" class="results-list" role="listbox" aria-label="搜索结果列表" tabindex="0"></ul>
    <div id="emptyHint" class="empty-hint" role="status" aria-live="polite" hidden>
      <div class="empty-icon" aria-hidden="true">♪</div>
      <div class="empty-text">输入关键词开始搜索</div>
    </div>
  </section>

</main>

<!-- 底部状态栏 -->
<div class="status-bar" id="statusBar" role="status" aria-live="polite">
  <span>当前未播放</span>
  <span class="sb-sep">|</span>
  <span>当前列表共 0 项</span>
  <span class="sb-sep">|</span>
  <span>已加载 0 个音源</span>
</div>

<!-- 迷你播放条 -->
<footer class="mini-player" id="miniPlayer" role="region" aria-label="播放控制">
  <div class="mp-info">
    <span class="mp-track" id="mpTrack">未播放</span>
    <span class="mp-artist" id="mpArtist"></span>
    <span class="mp-quality" id="mpQuality"></span>
  </div>
  <div class="mp-progress" id="mpProgress" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
    <div class="mp-progress-fill" id="mpProgressFill"></div>
  </div>
  <div class="mp-time">
    <span id="mpCurTime">0:00</span> / <span id="mpTotalTime">0:00</span>
  </div>
  <div class="mp-controls">
    <button class="mp-btn" id="mpPrev" aria-label="上一首" title="上一首">⏮</button>
    <button class="mp-btn mp-play" id="mpPlay" aria-label="播放或暂停" title="播放/暂停">▶</button>
    <button class="mp-btn" id="mpNext" aria-label="下一首" title="下一首">⏭</button>
    <button class="mp-btn" id="mpStop" aria-label="停止" title="停止">⏹</button>
  </div>
</footer>

<!-- 功能菜单覆盖层（原ALT菜单，保留但改为下拉面板风格） -->
<div class="alt-overlay" id="altOverlay" role="dialog" aria-label="功能菜单" aria-modal="false" hidden>
  <div class="alt-panels">
    <div class="alt-panel" id="panelPlay" role="region" aria-label="播放面板" hidden></div>
    <div class="alt-panel" id="panelPlaylist" role="region" aria-label="歌单面板" hidden></div>
    <div class="alt-panel" id="panelCharts" role="region" aria-label="排行榜面板" hidden></div>
    <div class="alt-panel" id="panelSettings" role="region" aria-label="设置面板" hidden></div>
    <div class="alt-panel" id="panelHelp" role="region" aria-label="帮助面板" hidden></div>
    <div class="alt-panel" id="panelSource" role="region" aria-label="音源管理面板" hidden></div>
  </div>
  <button class="alt-close" id="altClose" aria-label="关闭菜单">✕ 关闭</button>
</div>

<!-- 争渡读屏播报状态 -->
<div class="sr-only" id="liveRegion" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="assets/app.js"></script>
</body>
</html>
