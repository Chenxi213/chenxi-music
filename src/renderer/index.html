<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辰曦音乐</title>
<link rel="stylesheet" href="assets/main.css">
</head>
<body>

<!-- 极简主界面 - 只剩搜索框、平台筛选、类型筛选、搜索按钮 -->
<main class="main-wrap" role="main" aria-label="辰曦音乐主界面">

  <!-- 顶部：搜索行 -->
  <section class="search-section" aria-label="搜索区域">
    <div class="search-row">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="输入歌名、歌手或专辑…"
        aria-label="搜索框，输入关键词后回车搜索"
        autocomplete="off"
        spellcheck="false"
        accesskey="F"
      >
      <button id="searchBtn" class="search-btn" aria-label="搜索按钮">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>搜索</span>
      </button>
    </div>

    <!-- 平台筛选 -->
    <div class="filter-row">
      <span class="filter-label" id="platLabel">平台</span>
      <div class="chips" role="group" aria-labelledby="platLabel" id="platChips">
        <button class="chip on" data-p="all" role="checkbox" aria-checked="true">全部</button>
        <button class="chip" data-p="wy" role="checkbox" aria-checked="false">网易云</button>
        <button class="chip" data-p="tx" role="checkbox" aria-checked="false">QQ音乐</button>
        <button class="chip" data-p="kg" role="checkbox" aria-checked="false">酷狗</button>
        <button class="chip" data-p="kw" role="checkbox" aria-checked="false">酷我</button>
        <button class="chip" data-p="mg" role="checkbox" aria-checked="false">咪咕</button>
        <button class="chip" data-p="qsvip" role="checkbox" aria-checked="false">汽水</button>
        <button class="chip" data-p="git" role="checkbox" aria-checked="false">Git</button>
        <button class="chip" data-p="bili" role="checkbox" aria-checked="false">B站</button>
        <button class="chip" data-p="local" role="checkbox" aria-checked="false">本地</button>
      </div>
    </div>

    <!-- 类型筛选 -->
    <div class="filter-row">
      <span class="filter-label" id="typeLabel">类型</span>
      <div class="chips" role="group" aria-labelledby="typeLabel" id="typeChips">
        <button class="chip on" data-t="all" role="checkbox" aria-checked="true">全部</button>
        <button class="chip" data-t="hr" role="checkbox" aria-checked="false">Hi-Res</button>
        <button class="chip" data-t="loss" role="checkbox" aria-checked="false">无损</button>
        <button class="chip" data-t="live" role="checkbox" aria-checked="false">Live</button>
        <button class="chip" data-t="acoustic" role="checkbox" aria-checked="false">纯音乐</button>
      </div>
    </div>

    <!-- ALT 菜单提示 -->
    <div class="alt-hint" role="note" aria-label="按 Alt 键打开功能菜单">
      <kbd>Alt</kbd> 打开功能菜单
      <span class="dot">·</span>
      <kbd>Enter</kbd> 播放选中
      <span class="dot">·</span>
      <kbd>Menu</kbd> 或右键 歌曲菜单
      <span class="dot">·</span>
      <kbd>P</kbd> 播报进度
    </div>
  </section>

  <!-- 搜索结果列表 -->
  <section class="results-section" aria-label="搜索结果">
    <div class="results-header">
      <span class="rh-num">#</span>
      <span class="rh-name">歌曲</span>
      <span class="rh-artist">歌手</span>
      <span class="rh-plat">平台</span>
      <span class="rh-quality">音质</span>
      <span class="rh-duration">时长</span>
      <span class="rh-actions"></span>
    </div>
    <ul id="resultsList" class="results-list" role="listbox" aria-label="搜索结果列表"></ul>
    <div id="emptyHint" class="empty-hint" role="status" aria-live="polite" hidden>
      <div class="empty-icon" aria-hidden="true">♪</div>
      <div class="empty-text">输入关键词开始搜索</div>
    </div>
  </section>

</main>

<!-- 迷你播放条（底部固定，不影响主界面极简） -->
<footer class="mini-player" id="miniPlayer" role="region" aria-label="播放控制">
  <div class="mp-info">
    <span class="mp-track" id="mpTrack">未播放</span>
    <span class="mp-artist" id="mpArtist"></span>
    <span class="mp-quality" id="mpQuality"></span>
  </div>
  <div class="mp-progress" id="mpProgress" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
    <div class="mp-progress-fill" id="mpProgressFill"></div>
  </div>
  <div class="mp-time">
    <span id="mpCurTime">0:00</span> / <span id="mpTotalTime">0:00</span>
  </div>
  <div class="mp-controls">
    <button class="mp-btn" id="mpPrev" aria-label="上一首" title="上一首">⏮</button>
    <button class="mp-btn mp-play" id="mpPlay" aria-label="播放或暂停" title="播放/暂停">▶</button>
    <button class="mp-btn" id="mpNext" aria-label="下一首" title="下一首">⏭</button>
  </div>
</footer>

<!-- ALT 菜单覆盖层 -->
<div class="alt-overlay" id="altOverlay" role="dialog" aria-label="功能菜单" aria-modal="false" hidden>
  <nav class="alt-menu" id="altMenu" role="menubar" aria-label="ALT 功能菜单">
    <button class="alt-tab" data-panel="play" role="menuitem" aria-haspopup="true" aria-expanded="false" accesskey="P">
      <span class="alt-key">P</span><span class="alt-name">播放面板</span>
    </button>
    <button class="alt-tab" data-panel="playlist" role="menuitem" aria-haspopup="true" aria-expanded="false" accesskey="L">
      <span class="alt-key">L</span><span class="alt-name">歌单</span>
    </button>
    <button class="alt-tab" data-panel="charts" role="menuitem" aria-haspopup="true" aria-expanded="false" accesskey="C">
      <span class="alt-key">C</span><span class="alt-name">排行榜</span>
    </button>
    <button class="alt-tab" data-panel="settings" role="menuitem" aria-haspopup="true" aria-expanded="false" accesskey="S">
      <span class="alt-key">S</span><span class="alt-name">设置</span>
    </button>
    <button class="alt-tab" data-panel="help" role="menuitem" aria-haspopup="true" aria-expanded="false" accesskey="H">
      <span class="alt-key">H</span><span class="alt-name">帮助</span>
    </button>
    <button class="alt-tab alt-close" id="altClose" role="menuitem" aria-label="关闭菜单">✕</button>
  </nav>

  <div class="alt-panels">
    <!-- 播放面板 -->
    <div class="alt-panel" id="panelPlay" role="region" aria-label="播放面板" hidden></div>
    <!-- 歌单面板 -->
    <div class="alt-panel" id="panelPlaylist" role="region" aria-label="歌单面板" hidden></div>
    <!-- 排行榜面板 -->
    <div class="alt-panel" id="panelCharts" role="region" aria-label="排行榜面板" hidden></div>
    <!-- 设置面板 -->
    <div class="alt-panel" id="panelSettings" role="region" aria-label="设置面板" hidden></div>
    <!-- 帮助面板 -->
    <div class="alt-panel" id="panelHelp" role="region" aria-label="帮助面板" hidden></div>
  </div>
</div>

<!-- 争渡读屏播报状态（视觉隐藏，争渡读屏通过UIA LiveRegion自动朗读） -->
<div class="sr-only" id="liveRegion" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="assets/app.js"></script>
</body>
</html>
