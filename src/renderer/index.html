<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辰曦音乐</title>
<link rel="stylesheet" href="assets/main.css">
</head>
<body>

<main class="main-wrap" role="main" aria-label="辰曦音乐主界面">

  <!-- 搜索区域（下拉框风格，参考截图的平台筛选+分类） -->
  <section class="search-section" aria-label="搜索区域">
    <div class="search-toolbar">
      <div class="search-icon" aria-hidden="true">♪</div>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="输入歌名、歌手或专辑…"
        aria-label="搜索框，输入关键词后回车搜索"
        autocomplete="off"
        spellcheck="false"
        accesskey="F"
      >
      <select id="scopeSelect" class="search-select" aria-label="搜索范围">
        <option value="song">歌曲</option>
        <option value="playlist">歌单</option>
        <option value="album">专辑</option>
        <option value="singer">歌手</option>
      </select>
      <select id="siteSelect" class="search-select" aria-label="搜索站点">
        <option value="all">全部站点</option>
        <option value="wy">网易云音乐</option>
        <option value="tx">QQ音乐</option>
        <option value="kg">酷狗</option>
        <option value="kw">酷我</option>
        <option value="mg">咪咕</option>
        <option value="qsvip">汽水VIP</option>
        <option value="bili">B站</option>
        <option value="git">Git音源</option>
        <option value="local">本地</option>
      </select>
      <button id="searchBtn" class="search-btn" aria-label="搜索">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <span id="searchMeta" class="search-meta" aria-live="polite"></span>
    </div>
    <div class="filter-row">
      <span class="filter-label">音质</span>
      <div class="chips" role="group" aria-label="音质筛选" id="qualityChips">
        <button class="chip on" data-q="all" role="checkbox" aria-checked="true">全部</button>
        <button class="chip" data-q="hr" role="checkbox" aria-checked="false">Hi-Res</button>
        <button class="chip" data-q="loss" role="checkbox" aria-checked="false">无损</button>
        <button class="chip" data-q="std" role="checkbox" aria-checked="false">标准</button>
      </div>
    </div>
    <div class="alt-hint">
      按 <kbd>Alt</kbd> 呼出功能菜单 &nbsp;<span class="dot">·</span>&nbsp; <kbd>F4</kbd> 音源管理 &nbsp;<span class="dot">·</span>&nbsp; <kbd>↑</kbd><kbd>↓</kbd> 浏览结果 &nbsp;<span class="dot">·</span>&nbsp; <kbd>Menu</kbd> 歌曲菜单
    </div>
  </section>

  <!-- 搜索结果列表 -->
  <section class="results-section" aria-label="搜索结果">
    <div class="results-header">
      <span class="rh-num">#</span>
      <span class="rh-name">歌曲</span>
      <span class="rh-artist">歌手</span>
      <span class="rh-plat">平台</span>
      <span class="rh-quality">音质</span>
      <span class="rh-duration">时长</span>
      <span class="rh-actions"></span>
    </div>
    <ul id="resultsList" class="results-list" role="listbox" aria-label="搜索结果列表" tabindex="0"></ul>
    <div id="emptyHint" class="empty-hint" role="status" aria-live="polite" hidden>
      <div class="empty-icon" aria-hidden="true">♪</div>
      <div class="empty-text">输入关键词开始搜索</div>
    </div>
  </section>

</main>

<!-- 底部状态栏 -->
<div class="status-bar" id="statusBar" role="status" aria-live="polite">
  <span>当前未播放</span><span class="sb-sep">|</span><span>共 0 项</span><span class="sb-sep">|</span><span id="sbSource">已加载 0 个音源</span>
</div>

<!-- 迷你播放条 -->
<footer class="mini-player" id="miniPlayer" role="region" aria-label="播放控制">
  <div class="mp-info">
    <span class="mp-track" id="mpTrack">未播放</span>
    <span class="mp-artist" id="mpArtist"></span>
    <span class="mp-quality" id="mpQuality"></span>
  </div>
  <div class="mp-progress" id="mpProgress" role="slider" aria-label="播放进度" tabindex="0">
    <div class="mp-progress-fill" id="mpProgressFill"></div>
  </div>
  <div class="mp-time">
    <span id="mpCurTime">0:00</span> / <span id="mpTotalTime">0:00</span>
  </div>
  <div class="mp-controls">
    <button class="mp-btn" id="mpPrev" aria-label="上一首" title="上一首">⏮</button>
    <button class="mp-btn mp-play" id="mpPlay" aria-label="播放或暂停" title="播放/暂停">▶</button>
    <button class="mp-btn" id="mpNext" aria-label="下一首" title="下一首">⏭</button>
    <button class="mp-btn" id="mpStop" aria-label="停止" title="停止">⏹</button>
  </div>
</footer>

<!-- ALT 功能菜单覆盖层（右光标展开式菜单栏） -->
<div class="alt-overlay" id="altOverlay" role="menubar" aria-label="功能菜单" hidden>
  <div class="alt-menubar">
    <button class="alt-mi" data-panel="play" role="menuitem" aria-haspopup="true" aria-expanded="false">
      播放<span class="alt-mi-key">Alt+P</span>
    </button>
    <button class="alt-mi" data-panel="playlist" role="menuitem" aria-haspopup="true" aria-expanded="false">
      歌单<span class="alt-mi-key">Alt+L</span>
    </button>
    <button class="alt-mi" data-panel="charts" role="menuitem" aria-haspopup="true" aria-expanded="false">
      排行榜<span class="alt-mi-key">Alt+R</span>
    </button>
    <button class="alt-mi" data-panel="source" role="menuitem" aria-haspopup="true" aria-expanded="false">
      音源<span class="alt-mi-key">F4</span>
    </button>
    <button class="alt-mi" data-panel="settings" role="menuitem" aria-haspopup="true" aria-expanded="false">
      设置<span class="alt-mi-key">Alt+S</span>
    </button>
    <button class="alt-mi" data-panel="help" role="menuitem" aria-haspopup="true" aria-expanded="false">
      帮助<span class="alt-mi-key">Alt+H</span>
    </button>
    <button class="alt-close" id="altClose" aria-label="关闭菜单">✕</button>
  </div>
  <div class="alt-dropdowns">
    <div class="alt-dd" id="ddPlay" role="menu" aria-label="播放菜单" hidden></div>
    <div class="alt-dd" id="ddPlaylist" role="menu" aria-label="歌单菜单" hidden></div>
    <div class="alt-dd" id="ddCharts" role="menu" aria-label="排行榜菜单" hidden></div>
    <div class="alt-dd" id="ddSource" role="menu" aria-label="音源菜单" hidden></div>
    <div class="alt-dd" id="ddSettings" role="menu" aria-label="设置菜单" hidden></div>
    <div class="alt-dd" id="ddHelp" role="menu" aria-label="帮助菜单" hidden></div>
  </div>
</div>

<!-- 争渡读屏播报 -->
<div class="sr-only" id="liveRegion" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="assets/app.js"></script>
</body>
</html>
